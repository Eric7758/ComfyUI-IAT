name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build
    
    - name: Build package
      run: python -m build
    
    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        body: |
          ## ComfyUI-IAT Release

          ### Highlights
          - Official Qwen model path only
          - Fixed model directory: `ComfyUI/models/diffusion_models`
          - Download order: `ModelScope -> HuggingFace`
          - No runtime dependency auto-upgrade
          - Production error codes with trace IDs

          ### Notes
          - See `UPDATE.md` for full changelog.
          - For v2.0.0 detailed release notes, see `.github/release-v2.0.0.md`.
    
    - name: Upload Release Assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./dist/
        asset_name: ComfyUI-IAT-${{ github.ref_name }}.zip
        asset_content_type: application/zip
